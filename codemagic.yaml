workflows:

  # ─── iOS — Test Build (no signing) ──────────────────────────
  ios-test:
    name: Pilgrim's Progress — iOS Test
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      node: v18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Build for simulator (no signing needed)
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - gibsond264@gmail.com
        notify:
          success: true
          failure: true

  # ─── Android — Release APK ───────────────────────────────────
  android-release:
    name: Pilgrim's Progress — Android
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      node: v18
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - gibsond264@gmail.com
        notify:
          success: true
          failure: true
