workflows:

  # ─── iOS — Unsigned IPA for Sideloadly ──────────────────────
  ios-unsigned:
    name: Pilgrim's Progress — iOS Unsigned
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      node: v22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Build unsigned archive
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            -archivePath /tmp/App.xcarchive

      - name: Package into IPA
        script: |
          mkdir -p /tmp/Payload
          cp -r "/tmp/App.xcarchive/Products/Applications/App.app" /tmp/Payload/
          cd /tmp && zip -r App.ipa Payload

    artifacts:
      - /tmp/App.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - gibsond264@gmail.com
        notify:
          success: true
          failure: true

  # ─── Android — Release APK ───────────────────────────────────
  android-release:
    name: Pilgrim's Progress — Android
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      node: v22
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - gibsond264@gmail.com
        notify:
          success: true
          failure: true
