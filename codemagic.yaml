workflows:

  # ─── iOS — App Store Build ───────────────────────────────────
  ios-release:
    name: Pilgrim's Progress — iOS
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Apple Developer

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.davidgibson.pilgrimsprogress
      node: v18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - gibsond264@gmail.com
        notify:
          success: true
          failure: true

  # ─── Android — Release APK ───────────────────────────────────
  android-release:
    name: Pilgrim's Progress — Android
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      node: v18
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - gibsond264@gmail.com
        notify:
          success: true
          failure: true
